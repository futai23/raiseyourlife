<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" role="img" aria-label="Raiseyourlife">
  <defs>
    <linearGradient id="markGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Triple rising chevrons -->
  <g transform="translate(8, 8)">
    <polyline points="0,40 14,26 28,40"
      fill="none" stroke="#93C5FD" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <polyline points="0,28 14,14 28,28"
      fill="none" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <polyline points="0,16 14,2 28,16"
      fill="none" stroke="url(#markGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark: Stacked All-Caps (Pattern A) -->
  <text x="52" y="28"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="20" font-weight="900" letter-spacing="2" fill="#1E3A5F">RAISE</text>
  <text x="52" y="54"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="16" font-weight="500" letter-spacing="3.5" fill="#1D4ED8">YOUR LIFE</text>
</svg>
